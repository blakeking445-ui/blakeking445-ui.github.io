<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project 3 · Heatmap Deviation Analysis</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
  }
  </script>

  <style>
/* (ALL YOUR CSS UNCHANGED — omitted here for brevity but keep yours exactly) */
  </style>
</head>

<body>

<div class="cursor-glow"></div>
<a class="back" href="../index.html">← Back</a>

<div class="container">

<h1> Dimensional Accuracy Analysis Using Heat Mapping </h1>

<p>oiler</p>

<div class="side-by-side">

  <div class="left-col">
    <h2>Final product images</h2>
    <div class="image-row">
      <img src="project31.jpg">
      <img src="project32.jpg">
    </div>
  </div>

  <div class="right-col">
    <h2>3D comparison · CAD vs scan</h2>

    <button onclick="toggleCAD()">🔵 Toggle CAD</button>
    <button onclick="toggleScan()">🟠 Toggle Scan</button>

    <div id="viewer"></div>

    <div class="controls-hint">
      🖱 Drag = Rotate | 🔍 Scroll = Zoom | 🖱 Right Click = Pan
    </div>
  </div>

</div>
</div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a3542);

/* ✅ FIXED: zoomed out more */
const camera = new THREE.PerspectiveCamera(60, 1, 0.001, 1000);
camera.position.set(0.4, 0.4, 0.6);

const viewerEl = document.getElementById("viewer");
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(viewerEl.clientWidth, viewerEl.clientHeight);
viewerEl.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0,0,0);

/* ✅ LIGHTING (restored properly) */
scene.add(new THREE.AmbientLight(0xffffff, 0.65));

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5,8,5);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xccddff, 0.4);
fillLight.position.set(-3,2,4);
scene.add(fillLight);

/* ✅ GRID (restored CAD feel) */
const gridHelper = new THREE.GridHelper(0.8, 20, 0x8899aa, 0x334455);
gridHelper.position.y = -0.03;
scene.add(gridHelper);

const loader = new GLTFLoader();

let cadModel, scanModel;

/* ✅ FIXED: material styling restored */
loader.load("../oilerparametric.glb", (gltf)=>{
  cadModel = gltf.scene;

  cadModel.traverse((obj)=>{
    if(obj.isMesh){
      obj.material = new THREE.MeshStandardMaterial({
        color: 0x3b82f6,
        transparent: true,
        opacity: 0.85,
        roughness: 0.4,
        metalness: 0.1
      });
    }
  });

  scene.add(cadModel);
});

loader.load("../oilerscanfixed.glb", (gltf)=>{
  scanModel = gltf.scene;

  scanModel.traverse((obj)=>{
    if(obj.isMesh){
      obj.material = new THREE.MeshStandardMaterial({
        color: 0xff8c00,
        transparent: true,
        opacity: 0.85,
        roughness: 0.6,
        metalness: 0.05
      });
    }
  });

  scene.add(scanModel);
});

/* toggle safety */
window.toggleCAD = () => cadModel && (cadModel.visible = !cadModel.visible);
window.toggleScan = () => scanModel && (scanModel.visible = !scanModel.visible);

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

/* resize fix */
function resize(){
  const w = viewerEl.clientWidth;
  const h = viewerEl.clientHeight;
  renderer.setSize(w,h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);
resize();

</script>

<script>
const glow = document.querySelector(".cursor-glow");
let mouseX=0, mouseY=0, x=0, y=0;

document.addEventListener("mousemove", e=>{
  mouseX=e.clientX;
  mouseY=e.clientY;
});

function animateGlow(){
  x += (mouseX-x)*0.45;
  y += (mouseY-y)*0.45;
  glow.style.transform=`translate(${x}px,${y}px) translate(-50%,-50%)`;
  requestAnimationFrame(animateGlow);
}
animateGlow();
</script>

</body>
</html>
