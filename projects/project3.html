<!DOCTYPE html>

<head>

  <script type="importmap">

  <style>

.cursor-glow {
  position: fixed;
  top: 0;
  left: 0;
  width: 420px;
  height: 420px;
  pointer-events: none;
  border-radius: 50%;
  z-index: 9999;
  background: radial-gradient(circle,
    rgba(255,255,255,0.45) 0%,
    rgba(59,130,246,0.40) 8%,
    rgba(59,130,246,0.20) 20%,
    rgba(59,130,246,0.08) 45%,
    rgba(59,130,246,0.02) 65%,
    transparent 80%
  );
  filter: blur(28px);
  opacity: 0.95;
  transform: translate(-50%, -50%);
  will-change: transform;
  transition: opacity 0.25s ease;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #0f172a;
  color: white;
}

.back {
  position: fixed;
  top: 15px;
  left: 15px;
  padding: 10px 14px;
  background: rgba(0,0,0,0.6);
  border-radius: 8px;
  color: white;
  text-decoration: none;
  z-index: 10;
  backdrop-filter: blur(4px);
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 80px 20px 40px;
}

h1, h2 {
  font-weight: 500;
  letter-spacing: -0.02em;
}

p {
  line-height: 1.6;
  opacity: 0.9;
}

img {
  width: 100%;
  border-radius: 12px;
  margin: 10px 0;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.image-row {
  display: flex;
  gap: 16px;
}

.image-row img {
  width: 48%;
  height: 340px;
  object-fit: cover;
  border-radius: 12px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.image-row img:hover {
  transform: scale(1.04);
  box-shadow:
    0 25px 60px rgba(0,0,0,0.6),
    0 0 40px rgba(59,130,246,0.5),
    0 0 100px rgba(59,130,246,0.35),
    0 0 180px rgba(59,130,246,0.2);
}

/* NEW: side-by-side layout */
.side-by-side {
  display: flex;
  gap: 24px;
  align-items: flex-start;
  flex-wrap: wrap;
}

.left-col, .right-col {
  flex: 1;
  min-width: 300px;
}

#viewer {
  width: 100%;
  height: 500px;
  border-radius: 16px;
  margin-top: 20px;
  background: #111;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

button {

  margin-right: 12px;

  border-radius: 40px;
  border: none;

  font-weight: 500;

  background: #334155;

  box-shadow: 0 4px 6px rgba(0,0,0,0.2);

.controls-hint {
  margin-top: 16px;
  padding: 12px 18px;

  background: rgba(15, 23, 42, 0.5);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 40px;
  text-align: center;
  display: inline-block;
}

@media (max-width: 600px) {
  .container { padding: 70px 16px 20px; }

  </style>
</head>

<body>

<div class="cursor-glow"></div>
<a class="back" href="../index.html">← Back</a>

<div class="container">

<h1> Dimensional Accuracy Analysis Using Heat Mapping </h1>

<p>
  oiler 
</p>

<!-- SIDE BY SIDE SECTION -->
<div class="side-by-side">

  <!-- LEFT -->
  <div class="left-col">
    <h2>Final product images</h2>
    <div class="image-row">
      <img src="project31.jpg">
      <img src="project32.jpg">
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-col">
    <h2>3D comparison · CAD vs scan</h2>

    <button onclick="toggleCAD()">🔵 Toggle CAD</button>
    <button onclick="toggleScan()">🟠 Toggle Scan</button>

    <div id="viewer"></div>

    <div class="controls-hint">
      🖱 Drag = Rotate | 🔍 Scroll = Zoom | 🖱 Right Click = Pan
    </div>
  </div>

</div>

</div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a3542);

const camera = new THREE.PerspectiveCamera(60, 1, 0.001, 1000);
camera.position.set(0.18, 0.18, 0.25);

const viewerEl = document.getElementById("viewer");
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(viewerEl.clientWidth, viewerEl.clientHeight);
viewerEl.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.65));

const loader = new GLTFLoader();
let cadModel, scanModel;

loader.load("../oilerparametric.glb", (gltf)=>{
  cadModel = gltf.scene;
  scene.add(cadModel);
});

loader.load("../oilerscanfixed.glb", (gltf)=>{
  scanModel = gltf.scene;
  scene.add(scanModel);
});

window.toggleCAD = () => cadModel.visible = !cadModel.visible;
window.toggleScan = () => scanModel.visible = !scanModel.visible;

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();
</script>

<script>
const glow = document.querySelector(".cursor-glow");
let mouseX=0, mouseY=0, x=0, y=0;

document.addEventListener("mousemove", e=>{
  mouseX=e.clientX;
  mouseY=e.clientY;
});

function animateGlow(){
  x += (mouseX-x)*0.45;
  y += (mouseY-y)*0.45;
  glow.style.transform=`translate(${x}px,${y}px) translate(-50%,-50%)`;
  requestAnimationFrame(animateGlow);
}
animateGlow();
</script>

</body>
</html>
