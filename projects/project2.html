<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project 2 · Your Title</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
    }

    .back {
      position: fixed;
      top: 15px;
      left: 15px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      color: white;
      text-decoration: none;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 80px 20px 40px;
    }

    h1, h2 {
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    p {
      line-height: 1.6;
      opacity: 0.9;
    }

    img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .image-row {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .image-row img {
      width: 48%;
      height: 340px;
      object-fit: cover;
      border-radius: 12px;
    }

    @media (max-width: 600px) {
      .container { padding: 70px 16px 20px; }
      .image-row img {
        width: 100%;
        height: auto;
      }
    }

    .image-row img {
  width: 48%;
  height: 340px;
  object-fit: cover;
  border-radius: 12px;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.image-row img:hover {
  transform: scale(1.035) translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.6);
}
  </style>
</head>

<body>

<a class="back" href="../index.html">← Back</a>

<div class="container">

  <!-- TITLE -->
  <h1>Your Project Title</h1>

  <!-- DESCRIPTION -->
  <p>
    Write your project description here. Explain what you built, why you built it,
    and what makes it interesting. Keep it similar tone to your first project so
    your portfolio feels consistent.
  </p>

  <!-- MEDIA -->
  <h2>Project media</h2>

  <div class="image-row">
    <img src="project2_image.jpg" alt="Project image">
    <img src="project2_demo.gif" alt="Project demo GIF">
  </div>

</div>

</body>
</html>
