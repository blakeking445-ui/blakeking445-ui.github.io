<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project 1</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* BACK BUTTON */
.back {
  position: fixed;
  top: 15px;
  left: 15px;
  padding: 10px 14px;
  background: rgba(0,0,0,0.6);
  border-radius: 8px;
  color: white;
  text-decoration: none;
  z-index: 10;
}

/* PAGE LAYOUT */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 80px 20px;
}

img {
  width: 100%;
  border-radius: 12px;
  margin: 10px 0;
}

/* 3D VIEWER */
#viewer {
  width: 100%;
  height: 500px;
  border-radius: 12px;
  margin-top: 20px;
  background: #111;
}

/* BUTTONS */
button {
  padding: 10px 12px;
  margin-right: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<a class="back" href="../index.html">← Back</a>

<div class="container">

  <!-- TITLE -->
  <h1>Project 1 Title</h1>

  <!-- DESCRIPTION -->
  <p>
    This project involved reverse engineering a part using 3D scanning,
    then rebuilding it in Fusion 360 as a parametric CAD model.
  </p>

  <!-- IMAGES -->
  <h2>Final Product Images</h2>
  <img src="../project1_1.jpg">
  <img src="../project1_2.jpg">

  <!-- 3D SECTION -->
  <h2>3D Model Comparison</h2>

  <button onclick="toggle('cad')">Toggle CAD</button>
  <button onclick="toggle('scan')">Toggle Scan</button>

  <div id="viewer"></div>

</div>

<!-- THREE.JS -->
<script type="module">
import * as THREE from "https://unpkg.com/three@0.158.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js";

/* SCENE */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111827);

/* CAMERA */
const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.001,
  1000
);
camera.position.set(0.2, 0.2, 0.2);

/* RENDERER */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, 500);
document.getElementById("viewer").appendChild(renderer.domElement);

/* CONTROLS */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

/* LIGHTS */
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

/* LOADER */
const loader = new GLTFLoader();

let cadModel = null;
let scanModel = null;

/* LOAD CAD */
loader.load("baseparametric.glb", (gltf) => {
  cadModel = gltf.scene;

  cadModel.traverse((m)=>{
    if(m.isMesh){
      m.material.color.set(0x0077ff);
      m.material.transparent = true;
      m.material.opacity = 0.85;
    }
  });

  scene.add(cadModel);
});

/* LOAD SCAN */
loader.load("basescan.glb", (gltf) => {
  scanModel = gltf.scene;

  scanModel.traverse((m)=>{
    if(m.isMesh){
      m.material.color.set(0xff5500);
      m.material.transparent = true;
      m.material.opacity = 0.85;
    }
  });

  scene.add(scanModel);
});

/* TOGGLE FUNCTION */
window.toggle = (type) => {
  if(type === "cad" && cadModel){
    cadModel.visible = !cadModel.visible;
  }

  if(type === "scan" && scanModel){
    scanModel.visible = !scanModel.visible;
  }
};

/* LOOP */
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* RESIZE */
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, 500);
});
</script>

</body>
</html>
