<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Comparison</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            z-index: 100;
            min-width: 250px;
        }

        #controls h2 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }

        .toggle-group {
            margin-bottom: 12px;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 8px 0;
        }

        .toggle-label input {
            display: none;
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #444;
            border-radius: 12px;
            position: relative;
            margin-right: 12px;
            transition: background 0.3s;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle-label input:checked + .toggle-switch {
            background: #4CAF50;
        }

        .toggle-label input:checked + .toggle-switch::after {
            transform: translateX(20px);
        }

        .model-name {
            font-size: 0.95rem;
        }

        .parametric-color {
            color: #64B5F6;
        }

        .scan-color {
            color: #FFB74D;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading models...</p>
    </div>

    <div id="controls">
        <h2>Model Visibility</h2>
        <div class="toggle-group">
            <label class="toggle-label">
                <input type="checkbox" id="toggle-parametric" checked>
                <span class="toggle-switch"></span>
                <span class="model-name parametric-color">Parametric Model</span>
            </label>
        </div>
        <div class="toggle-group">
            <label class="toggle-label">
                <input type="checkbox" id="toggle-scan" checked>
                <span class="toggle-switch"></span>
                <span class="model-name scan-color">3D Scan</span>
            </label>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div id="instructions">
        Drag to rotate • Scroll to zoom • Right-drag to pan
    </div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ============================================================
        // CHANGE YOUR FILE NAMES HERE
        // ============================================================
        const PARAMETRIC_MODEL_PATH = 'base_parametric.glb';  // <-- Your parametric model file
        const SCAN_MODEL_PATH = 'base_scan.glb';                  // <-- Your 3D scan file
        // ============================================================

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // Camera
        const camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(5, 3, 5);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 1;
        controls.maxDistance = 50;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
        fillLight.position.set(-5, 5, -5);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xffaa44, 0.4);
        rimLight.position.set(0, -5, -5);
        scene.add(rimLight);

        // Grid helper
        const gridHelper = new THREE.GridHelper(10, 20, 0x444444, 0x333333);
        scene.add(gridHelper);

        // Model references
        let parametricModel = null;
        let scanModel = null;

        // Loader
        const loader = new GLTFLoader();
        const loadingElement = document.getElementById('loading');
        let modelsLoaded = 0;

        function checkLoadingComplete() {
            modelsLoaded++;
            if (modelsLoaded >= 2) {
                loadingElement.style.display = 'none';
                fitCameraToModels();
            }
        }

        function fitCameraToModels() {
            const box = new THREE.Box3();
            
            if (parametricModel && parametricModel.visible) {
                box.expandByObject(parametricModel);
            }
            if (scanModel && scanModel.visible) {
                box.expandByObject(scanModel);
            }

            if (box.isEmpty()) return;

            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
            cameraZ *= 2.5;

            camera.position.set(center.x + cameraZ * 0.5, center.y + cameraZ * 0.3, center.z + cameraZ);
            controls.target.copy(center);
            controls.update();
        }

        // Load parametric model
        loader.load(
            PARAMETRIC_MODEL_PATH,
            (gltf) => {
                parametricModel = gltf.scene;
                
                // Apply blue-ish material to distinguish it
                parametricModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        // Optional: tint the material slightly blue
                        if (child.material) {
                            child.material = child.material.clone();
                            child.material.color.multiplyScalar(0.9);
                            child.material.emissive = new THREE.Color(0x64B5F6);
                            child.material.emissiveIntensity = 0.05;
                        }
                    }
                });
                
                scene.add(parametricModel);
                checkLoadingComplete();
            },
            (progress) => {
                console.log('Parametric model loading:', (progress.loaded / progress.total * 100).toFixed(1) + '%');
            },
            (error) => {
                console.error('Error loading parametric model:', error);
                checkLoadingComplete();
            }
        );

        // Load 3D scan model
        loader.load(
            SCAN_MODEL_PATH,
            (gltf) => {
                scanModel = gltf.scene;
                
                // Apply orange-ish material to distinguish it
                scanModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        // Optional: tint the material slightly orange
                        if (child.material) {
                            child.material = child.material.clone();
                            child.material.color.multiplyScalar(0.9);
                            child.material.emissive = new THREE.Color(0xFFB74D);
                            child.material.emissiveIntensity = 0.05;
                        }
                    }
                });
                
                scene.add(scanModel);
                checkLoadingComplete();
            },
            (progress) => {
                console.log('3D scan loading:', (progress.loaded / progress.total * 100).toFixed(1) + '%');
            },
            (error) => {
                console.error('Error loading 3D scan:', error);
                checkLoadingComplete();
            }
        );

        // Toggle controls
        document.getElementById('toggle-parametric').addEventListener('change', (e) => {
            if (parametricModel) {
                parametricModel.visible = e.target.checked;
            }
        });

        document.getElementById('toggle-scan').addEventListener('change', (e) => {
            if (scanModel) {
                scanModel.visible = e.target.checked;
            }
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
