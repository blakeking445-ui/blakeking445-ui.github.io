<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Model Comparison</title>

<style>
body { margin: 0; overflow: hidden; background: #1a1a2e; }
#ui {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border-radius: 10px;
    color: white;
    font-family: sans-serif;
}
</style>
</head>

<body>

<div id="ui">
    <label><input type="checkbox" id="p" checked> Parametric</label><br>
    <label><input type="checkbox" id="s" checked> Scan</label>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// ===== FILE PATHS =====
const PARAM = 'base_parametric.glb';
const SCAN = 'base_scan.glb';

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// camera
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(5,5,5);

// renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.minDistance = 0.01;   // allow VERY close zoom
controls.maxDistance = 100;    // optional, keep far zoom reasonable

// lights
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// loader
const loader = new GLTFLoader();

let model1, model2;

// ===== LOAD MODELS =====
loader.load(PARAM, (gltf)=>{
    model1 = gltf.scene;
    model1.traverse(o=>{
        if(o.isMesh){
            o.material = o.material.clone();
            o.material.color.set(0x64B5F6);
        }
    });
    scene.add(model1);
});

loader.load(SCAN, (gltf)=>{
    model2 = gltf.scene;
    model2.traverse(o=>{
        if(o.isMesh){
            o.material = o.material.clone();
            o.material.color.set(0xFFB74D);
        }
    });
    scene.add(model2);
});

// ===== TOGGLES =====
document.getElementById('p').onchange = e=>{
    if(model1) model1.visible = e.target.checked;
};
document.getElementById('s').onchange = e=>{
    if(model2) model2.visible = e.target.checked;
};

// resize
addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

// loop
function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
