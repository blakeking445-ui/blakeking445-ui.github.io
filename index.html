<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mesh Comparison Portfolio</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; }
        #controls { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #444; z-index: 10; }
        canvas { display: block; }
        .toggle-group { margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="controls">
        <div class="toggle-group">
            <input type="checkbox" id="toggleScan" checked> 
            <label for="toggleScan">Show 3D Scan (Grey)</label>
        </div>
        <div class="toggle-group">
            <input type="checkbox" id="toggleCAD" checked> 
            <label for="toggleCAD">Show CAD Model (Blue)</label>
        </div>
        <small style="color: #888;">Scroll to Zoom | Drag to Rotate</small>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(150, 150, 150); // Moved back to see the 115mm part

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(100, 200, 100);
        scene.add(sunLight);

        const loader = new GLTFLoader();
        let scanMesh, cadMesh;

        // --- LOADING FUNCTION ---
        // We use a function to avoid repeating code for both models
        function loadModel(path, color, isScan) {
            loader.load(path, (geometry) => {
                geometry.center(); // This moves the model's center to 0,0,0
                
                const material = new THREE.MeshStandardMaterial({ 
                    color: color,
                    metalness: 0.5,
                    roughness: 0.5
                });
                
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);
                
                if (isScan) scanMesh = mesh;
                else cadMesh = mesh;
                
                console.log(`Loaded: ${path}`);
            }, undefined, (error) => {
                console.error(`Error loading ${path}:`, error);
            });
        }

        // --- CHANGE FILENAMES HERE ---
        // Make sure these match your GitHub files exactly (Case Sensitive!)
        loadModel('base_scan.glb', 0x888888, true);  // Grey for scan
        loadModel('base_parametric.glb', 0x0066ff, false); // Blue for CAD

        // --- UI LOGIC ---
        document.getElementById('toggleScan').addEventListener('change', (e) => {
            if(scanMesh) scanMesh.visible = e.target.checked;
        });

        document.getElementById('toggleCAD').addEventListener('change', (e) => {
            if(cadMesh) cadMesh.visible = e.target.checked;
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
