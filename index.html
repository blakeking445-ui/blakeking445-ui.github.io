<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// ===== FILE PATHS =====
const PARAM = 'base_parametric.glb';
const SCAN = 'base_scan.glb';

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.001, 1000);
camera.position.set(1,1,1);

// ===== RENDERER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== CONTROLS =====
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 0.001;  // 🔥 allows super close zoom
controls.maxDistance = 100;

// ===== LIGHTS =====
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// ===== LOADER =====
const loader = new GLTFLoader();

let model1, model2;

// ===== AUTO FIT CAMERA =====
function fitCamera() {
    const box = new THREE.Box3();

    if (model1) box.expandByObject(model1);
    if (model2) box.expandByObject(model2);

    if (box.isEmpty()) return;

    const size = box.getSize(new THREE.Vector3()).length();
    const center = box.getCenter(new THREE.Vector3());

    camera.near = size / 100;
    camera.far = size * 100;
    camera.updateProjectionMatrix();

    camera.position.copy(center);
    camera.position.x += size / 2;
    camera.position.y += size / 5;
    camera.position.z += size / 2;

    controls.target.copy(center);
    controls.update();
}

// ===== LOAD PARAMETRIC =====
loader.load(PARAM, (gltf)=>{
    model1 = gltf.scene;

    // OPTIONAL scale fix (uncomment if tiny)
    // model1.scale.set(1000,1000,1000);

    model1.traverse(o=>{
        if(o.isMesh){
            o.material = o.material.clone();
            o.material.color.set(0x64B5F6);
        }
    });

    scene.add(model1);
    if (model2) fitCamera();
});

// ===== LOAD SCAN =====
loader.load(SCAN, (gltf)=>{
    model2 = gltf.scene;

    // OPTIONAL scale fix (uncomment if tiny)
    // model2.scale.set(1000,1000,1000);

    model2.traverse(o=>{
        if(o.isMesh){
            o.material = o.material.clone();
            o.material.color.set(0xFFB74D);
        }
    });

    scene.add(model2);
    if (model1) fitCamera();
});

// ===== TOGGLES =====
document.getElementById('p').onchange = e=>{
    if(model1) model1.visible = e.target.checked;
};

document.getElementById('s').onchange = e=>{
    if(model2) model2.visible = e.target.checked;
};

// ===== RESIZE =====
addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

// ===== LOOP =====
function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
