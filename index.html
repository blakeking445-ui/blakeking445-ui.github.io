<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GLB Compare Viewer</title>

  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,0.9);
      padding: 10px;
      border-radius: 8px;
    }
    button {
      display: block;
      margin: 5px 0;
      padding: 6px 10px;
      cursor: pointer;
    }
  </style>

  <!-- FIXES MODULE ERROR -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>

<div id="ui">
  <button onclick="toggleParametric()">Toggle Parametric</button>
  <button onclick="toggleScan()">Toggle Scan</button>
</div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

// Camera
const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.001,
  1000
);
camera.position.set(0.1, 0.1, 0.2);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 0.001;
controls.maxDistance = 100;
controls.target.set(0, 0, 0);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

// Loader
const loader = new GLTFLoader();

let parametricModel = null;
let scanModel = null;

// LOAD PARAMETRIC
loader.load("parametric.glb", (gltf) => {
  parametricModel = gltf.scene;

  parametricModel.traverse((c) => {
    if (c.isMesh) {
      c.material.transparent = true;
      c.material.opacity = 0.7;
      c.material.color.set(0x0077ff);
    }
  });

  scene.add(parametricModel);
});

// LOAD SCAN
loader.load("scan.glb", (gltf) => {
  scanModel = gltf.scene;

  scanModel.traverse((c) => {
    if (c.isMesh) {
      c.material.transparent = true;
      c.material.opacity = 0.7;
      c.material.color.set(0xff5500);
    }
  });

  scene.add(scanModel);
});

// TOGGLES
window.toggleParametric = () => {
  if (parametricModel) parametricModel.visible = !parametricModel.visible;
};

window.toggleScan = () => {
  if (scanModel) scanModel.visible = !scanModel.visible;
};

// RESIZE
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// LOOP
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

</script>

</body>
</html>
