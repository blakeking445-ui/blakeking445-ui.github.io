<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio Mesh Toggle</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; }
        #controls { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="controls">
        <h3>Mesh Comparison</h3>
        <label><input type="checkbox" id="toggleScan" checked> Show Scan</label><br>
        <label><input type="checkbox" id="toggleCAD" checked> Show CAD Model</label>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light, new THREE.AmbientLight(0x404040));
        camera.position.z = 5;

        const loader = new GLTFLoader();
        let scanMesh, cadMesh;

        // --- LOAD YOUR FILES HERE ---
        
        // 1. Load the Scan
        loader.load('models/my_scan.glb', (gltf) => { // <--- CHANGE FILENAME HERE
            scanMesh = gltf.scene;
            scene.add(scanMesh);
        });

        // 2. Load the CAD Model
        loader.load('models/my_cad.glb', (gltf) => { // <--- CHANGE FILENAME HERE
            cadMesh = gltf.scene;
            scene.add(cadMesh);
        });

        // --- UI LOGIC ---
        document.getElementById('toggleScan').addEventListener('change', (e) => {
            if(scanMesh) scanMesh.visible = e.target.checked;
        });

        document.getElementById('toggleCAD').addEventListener('change', (e) => {
            if(cadMesh) cadMesh.visible = e.target.checked;
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
