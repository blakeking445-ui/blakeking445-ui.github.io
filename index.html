<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB Model Toggle</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
        #toggleButtonContainer {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1;
        }
        button {
            margin: 5px;
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="toggleButtonContainer">
        <button id="showParametric">Show Parametric Model</button>
        <button id="showScan">Show Scan Model</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        let scene, camera, renderer, parametricModel, scanModel;

        init();
        animate();

        function init() {
            // Set up the scene
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            camera.position.z = 5;

            // Load the GLB models
            const loader = new THREE.GLTFLoader();

            // Load Parametric Model
            loader.load('baseparametric.glb', function(gltf) {
                parametricModel = gltf.scene;
                scene.add(parametricModel);
            });

            // Load Scan Model
            loader.load('basescan.glb', function(gltf) {
                scanModel = gltf.scene;
                scene.add(scanModel);
                scanModel.visible = false; // Hide scan model by default
            });

            // Event listeners for buttons
            document.getElementById('showParametric').onclick = function() {
                if (parametricModel) {
                    parametricModel.visible = true;
                }
                if (scanModel) {
                    scanModel.visible = false;
                }
            };

            document.getElementById('showScan').onclick = function() {
                if (scanModel) {
                    scanModel.visible = true;
                }
                if (parametricModel) {
                    parametricModel.visible = false;
                }
            };

            // Handle window resizing
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
