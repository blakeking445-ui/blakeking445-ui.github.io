<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GLB Comparison Viewer</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: #202020;
    }

    canvas {
        display: block;
    }

    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.6);
        padding: 12px;
        border-radius: 10px;
        color: white;
    }

    label {
        display: block;
        margin-bottom: 6px;
        cursor: pointer;
    }
</style>
</head>

<body>

<div id="ui">
    <label>
        <input type="checkbox" id="toggleParametric" checked>
        Parametric Model
    </label>
    <label>
        <input type="checkbox" id="toggleScan" checked>
        Scan Model
    </label>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js";

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

// Camera (adjusted so you can zoom in MUCH closer)
const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.0001,
    1000
);
camera.position.set(0.1, 0.1, 0.1);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Controls (better zoom)
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 0.0001;  // <-- KEY FIX (zoom closer)
controls.maxDistance = 10;

// Lighting
const light1 = new THREE.DirectionalLight(0xffffff, 1);
light1.position.set(1, 1, 1);
scene.add(light1);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

// Loader
const loader = new GLTFLoader();

let parametricModel, scanModel;

// Load Parametric
loader.load("./models/parametric.glb", (gltf) => {
    parametricModel = gltf.scene;

    parametricModel.traverse((child) => {
        if (child.isMesh) {
            child.material = new THREE.MeshStandardMaterial({
                color: 0x00ffcc,
                transparent: true,
                opacity: 0.5
            });
        }
    });

    scene.add(parametricModel);
});

// Load Scan
loader.load("./models/scan.glb", (gltf) => {
    scanModel = gltf.scene;

    scanModel.traverse((child) => {
        if (child.isMesh) {
            child.material = new THREE.MeshStandardMaterial({
                color: 0xff6600,
                wireframe: true
            });
        }
    });

    scene.add(scanModel);
});

// Toggles
document.getElementById("toggleParametric").addEventListener("change", (e) => {
    if (parametricModel) parametricModel.visible = e.target.checked;
});

document.getElementById("toggleScan").addEventListener("change", (e) => {
    if (scanModel) scanModel.visible = e.target.checked;
});

// Resize
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animate
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
